<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <!-- Fundo do logo -->
  <rect width="200" height="60" fill="none"/>
  
  <!-- Cápsula/Frasco estilizado -->
  <g transform="translate(10, 10)">
    <!-- Frasco externo -->
    <rect x="8" y="5" width="18" height="35" rx="3" fill="#FF6B6B" opacity="0.8"/>
    
    <!-- Líquido dentro -->
    <rect x="9" y="20" width="16" height="18" rx="2" fill="#4ECDC4"/>
    
    <!-- Brilho -->
    <rect x="11" y="7" width="4" height="8" rx="2" fill="white" opacity="0.6"/>
    
    <!-- Rótulo -->
    <circle cx="17" cy="18" r="2" fill="white"/>
  </g>
  
  <!-- Texto da marca -->
  <text x="50" y="28" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2C3E50">VitaPower</text>
  <text x="50" y="42" font-family="Arial, sans-serif" font-size="10" fill="#FF6B6B">Suplementos</text>
  
  <!-- Linha decorativa -->
  <line x1="50" y1="45" x2="170" y2="45" stroke="#FF6B6B" stroke-width="1.5" opacity="0.5"/>
</svg>
